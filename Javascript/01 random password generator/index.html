<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Tagesschrift&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="main-container">
      <div class="password-container">
        <h1 class="main-heading">Password Generator</h1>
        <div class="input-container">
          <input
            type="text"
            class="input"
            id="input"
            value=""
            placeholder="create password"
          />
          <i class="fa-regular fa-copy"></i>
        </div>
        <div class="password-btns">
          <button class="btn generate-btn">Generate</button>
          <button class="btn clear-btn">Clear</button>
        </div>
      </div>
      <div class="alert-copy-password">Password is copied!</div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
